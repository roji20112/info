<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CPM Rank king</title>
<style>
    :root {
        --base-scale: 0.8; 
        --bg-color: #000;
        --text-color: #fff;
        --input-bg: #1a1a1a;
        --accent-color: #fff;
        --error-color: #ff3b30;
        --success-color: #34c759;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        transform: scale(var(--base-scale));
        transform-origin: center center;
    }

    .container {
        width: 100%;
        max-width: 340px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .header { text-align: center; margin-bottom: 5px; }

    h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 0;
    }

    input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid #333;
        padding: 12px;
        color: var(--text-color);
        font-size: 14px;
        border-radius: 8px;
        box-sizing: border-box;
        outline: none;
    }

    input:focus { border-color: #666; }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    button:active { opacity: 0.7; }

    .btn-primary {
        background-color: var(--accent-color);
        color: var(--bg-color);
    }

    .btn-secondary {
        background-color: var(--input-bg);
        color: var(--text-color);
    }

    /* ✅ التعديل هنا */
    .grid-menu {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .grid-menu button {
        width: 200px;
    }

    h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
        margin: 10px 0 5px 0;
        font-weight: 600;
        text-align: center;
    }

    #status, #serviceStatus {
        font-size: 11px;
        text-align: center;
        min-height: 18px;
        color: #666;
    }

    footer {
        margin-top: 40px;
        text-align: center;
        font-size: 10px;
        color: #222;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CPM Rank king & TASKES</h1>
    </div>

    <div id="loginForm">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="PJassword">
            <button class="btn-primary" onclick="handleLogin()">Login</button>
        </div>
        <div id="status" style="margin-top: 20px;"></div>
    </div>

    <div id="menuButtons" style="display:none;">
        <h2>Select Rank</h2>
        <div class="grid-menu">
            <button class="btn-secondary" onclick="kingRank()">KING</button>
        </div>
        <div id="serviceStatus" style="margin-top: 15px;"></div>
    </div>

    <footer>الموقع موثوق. | .The site is reliable</footer>
</div>
